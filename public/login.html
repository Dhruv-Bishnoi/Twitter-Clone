<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <!-- MAIN CARD -->
    <div class="w-full max-w-md border border-[#2f3336] rounded-2xl p-8 bg-black shadow-2xl">

        <!-- LOGO -->
        <div class="flex justify-center mb-8">

            <h1 class="text-5xl font-bold">
                X
            </h1>

        </div>


        <!-- TITLE -->
        <h1 class="text-3xl font-bold mb-8 text-center">
            Sign in to X
        </h1>



        <!-- FORM -->
        <form class="space-y-5">

            <!-- USERNAME -->
            <div>

                <input
                    type="text"
                    id="name"
                    placeholder="Username"
                    class="w-full bg-black border border-[#2f3336] rounded-lg px-4 py-4 text-white outline-none focus:border-[#1d9bf0] transition"
                >

            </div>



            <!-- PASSWORD -->
            <div>

                <input
                    type="password"
                    id="pass"
                    placeholder="Password"
                    class="w-full bg-black border border-[#2f3336] rounded-lg px-4 py-4 text-white outline-none focus:border-[#1d9bf0] transition"
                >

            </div>



            <!-- EMAIL -->
            <div>

                <input
                    type="email"
                    id="mail"
                    placeholder="Email"
                    class="w-full bg-black border border-[#2f3336] rounded-lg px-4 py-4 text-white outline-none focus:border-[#1d9bf0] transition"
                >

            </div>



            <!-- LOGIN BUTTON -->
            <button
                id="submitBtn"
                class="w-full bg-white text-black font-bold py-3 rounded-full hover:bg-[#d7dbdc] transition"
            >
                Login
            </button>

        </form>



        <!-- OR -->
        <div class="flex items-center gap-4 my-6">

            <div class="h-[1px] bg-[#2f3336] w-full"></div>

            <span class="text-[#71767b] text-sm">
                OR
            </span>

            <div class="h-[1px] bg-[#2f3336] w-full"></div>

        </div>



        <!-- SIGNUP -->
        <div class="text-center">

            <span class="text-[#71767b]">
                Don't have an account?
            </span>

            <a
                href="/signup"
                class="text-[#1d9bf0] hover:underline ml-1"
            >
                Sign up
            </a>

        </div>

    </div>
    <script src="login.js"></script>

</body>
</html>
