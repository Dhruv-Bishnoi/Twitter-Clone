<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/public/output.css"></head>
<body>
    <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Clone</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black">


<div class="w-full min-h-screen bg-black text-white">
     <form  >
                    <input id="imageInput" type="file" accept="image/*" class="hidden">
                    <img cl id="preview " src=""></img>
                    <div
                        class="w-full border-[#2f3336] mb-4 border border-default-medium rounded-base bg-neutral-secondary-medium shadow-xs">
                        <div class=" p-3 flex ">
                            <img id="PPFs" class="  w-15 h-15 rounded-4xl"
                                src=""
                                alt="">
                            <div id="textinput"
                                class=" textinput px-4 w-full  py-2 bg-neutral-secondary-medium rounded-t-base">
                                <label for="comment" class="sr-only">What’s happening</label>
                                <textarea id="comment" rows="4"
                                    class="block w-full  overflow-hidden text-ellipsis
                                     px-0  font-light text-xl text-heading bg-neutral-secondary-medium border-0 focus:ring-0 placeholder:text-body"
                                    placeholder="What’s happening?" required></textarea>
                            </div>
                        </div>
                        <div
                            class="flex border-[#2f3336] justify-between items-center px-3 py-2 border-t border-default-medium">
                            <div class="flex ps-0 space-x-1 rtl:space-x-reverse sm:ps-2">
                                <button type="button"
                                    class="p-2 text-body rounded-sm cursor-pointer hover:text-heading hover:bg-neutral-tertiary-medium">
                                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M15 9h.01M8.99 9H9m12 3a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM6.6 13a5.5 5.5 0 0 0 10.81 0H6.6Z" />
                                    </svg>
                                    <span class="sr-only">Add emoji</span>
                                </button>
                                <button type="button"
                                    class="p-2 text-body rounded-sm cursor-pointer hover:text-heading hover:bg-neutral-tertiary-medium">
                                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M7 8v8a5 5 0 1 0 10 0V6.5a3.5 3.5 0 1 0-7 0V15a2 2 0 0 0 4 0V8" />
                                    </svg>
                                    <span class="sr-only">Attach file</span>
                                </button>
                                <button type="button"
                                    class="p-2 text-body rounded-sm cursor-pointer hover:text-heading hover:bg-neutral-tertiary-medium">
                                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                            stroke-width="2" d="M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M17.8 13.938h-.011a7 7 0 1 0-11.464.144h-.016l.14.171c.1.127.2.251.3.371L12 21l5.13-6.248c.194-.209.374-.429.54-.659l.13-.155Z" />
                                    </svg>
                                    <span class="sr-only">Embed map</span>
                                </button>
                                <button type="button" id="uploadBtn"
                                    class=" p-2 text-body rounded-sm cursor-pointer hover:text-heading hover:bg-neutral-tertiary-medium">
                                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                        width="24" height="24" fill="" viewBox="0 0 24 24">
                                        <path fill="currentColor"
                                            d="M16 18H8l2.5-6 2 4 1.5-2 2 4Zm-1-8.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z" />
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M10 3v4a1 1 0 0 1-1 1H5m14-4v16a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7.914a1 1 0 0 1 .293-.707l3.914-3.914A1 1 0 0 1 9.914 3H18a1 1 0 0 1 1 1ZM8 18h8l-2-4-1.5 2-2-4L8 18Zm7-8.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z" />
                                    </svg>
                                    <span class="sr-only">Upload image</span>
                                </button>
                            </div>
                            <button id="submitBtn"
                                class="text-black font-bold hover:bg-[#1d9bf0] transition bg-[#2f3336] rounded-4xl box-border hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs leading-5 rounded-base text-sm px-3 py-2 focus:outline-none">
                                Post
                            </button>
                        </div>
                    </div>
                </form>

    <!-- TOP BAR -->
    <div class="sticky top-0 z-10 bg-black/80 backdrop-blur border-b border-[#2f3336]">

        <div class="flex items-center gap-8 px-4 py-3">

            <svg viewBox="0 0 24 24" aria-hidden="true"
                class="w-5 fill-white cursor-pointer">
                <g>
                    <path
                        d="M7.293 4.293L1.586 10l5.707 5.707 1.414-1.414L5.414 11H22V9H5.414l3.293-3.293z">
                    </path>
                </g>
            </svg>

            <div>

                <h1 class="text-[20px] font-bold">
                    Beniwal
                </h1>

                <p class="text-[#71767b] text-[13px]">
                    12 posts
                </p>

            </div>

        </div>

    </div>



    <!-- COVER PHOTO -->
    <div class="w-full h-[220px] bg-[#333639]">

        <img
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
            class="w-full h-full object-cover"
        >

    </div>



    <!-- PROFILE INFO -->
    <div class="px-4">

        <!-- DP + BUTTON -->
        <div class="flex justify-between items-start">

            <img
                src="https://i.pinimg.com/originals/74/a3/b6/74a3b6a8856b004dfff824ae9668fe9b.jpg"
                class="w-34 h-34 rounded-full border-4 border-black -mt-16 object-cover"
            >

            <button
                class="border border-[#536471] px-5 py-2 rounded-full font-bold mt-3 hover:bg-[#181818] transition">

                Edit profile

            </button>

        </div>



        <!-- USER DETAILS -->
        <div class="mt-3">

            <h1 class="text-[30px] font-bold leading-none">
                Beniwal
            </h1>

            <p class="text-[#71767b] text-[17px] mt-1">
                @beniwal
            </p>

        </div>



        <!-- BIO -->
        <p class="mt-4 text-[16px] leading-6">

            MERN Stack Developer • BCA Student • Building a Twitter Clone 🚀

        </p>



        <!-- EXTRA INFO -->
        <div class="flex gap-5 mt-4 text-[#71767b] text-[15px]">

            <div class="flex items-center gap-2">

                <svg viewBox="0 0 24 24" aria-hidden="true"
                    class="w-5 fill-[#71767b]">
                    <g>
                        <path
                            d="M7 4V2H5v2H2v18h20V4H7zm13 16H4V9h16v11z">
                        </path>
                    </g>
                </svg>

                Joined May 2026

            </div>

        </div>



        <!-- FOLLOWERS -->
        <div class="flex gap-5 mt-4 text-[15px]">

            <div>

                <span class="font-bold">
                    120
                </span>

                <span class="text-[#71767b]">
                    Following
                </span>

            </div>

            <div>

                <span class="font-bold">
                    12
                </span>

                <span class="text-[#71767b]">
                    Followers
                </span>

            </div>

        </div>

    </div>



    <!-- TABS -->
    <div class="flex justify-around mt-6 border-b border-[#2f3336] text-[#71767b] text-[15px] font-medium">

        <div  class="py-4 border-b-4 border-[#1d9bf0] text-white cursor-pointer">

            Posts

        </div>

        <div id="postsection" class="py-4 hover:bg-[#111] w-full text-center cursor-pointer">

            Replies

        </div>

        <div class="py-4 hover:bg-[#111] w-full text-center cursor-pointer">

            Media

        </div>

        <div class="py-4 hover:bg-[#111] w-full text-center cursor-pointer">

            Likes

        </div>

    </div>



    <!-- POSTS AREA -->
    <div class="postsArea">

        <!-- POSTS YAHAN AAYENGE -->

    </div>

</div>

<script src="test.js"></script>
</body>

</html>
</body>
</html>
